name: Refresh Embed Providers

on:
  schedule:
    # Runs daily at 8:00 AM Pacific (15:00 UTC)
    - cron: '0 15 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-providers:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run provider refresh
        env:
          GITHUB_ACTIONS: "true"
          NODE_OPTIONS: "--no-warnings"
        run: node scripts/provider-refresh.mjs 2>&1

      - name: Push changes (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/lib/streaming/providers.ts || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-refresh providers ($(date +%Y-%m-%d))"
            git push
          fi